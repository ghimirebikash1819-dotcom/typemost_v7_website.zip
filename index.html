<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeMost v7</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>TypeMost v7</h1>

<div class="controls">
<select id="language" onchange="setLanguage(this.value)">
<option>English</option>
<option>Nepali</option>
<option>Hindi</option>
<option>Spanish</option>
<option>French</option>
<option>Chinese</option>
<option>Arabic</option>
<option>Japanese</option>
</select>

<select id="mode" onchange="setMode(this.value)">
<option value="words">Word Mode</option>
<option value="time">Time Mode</option>
</select>

<input type="number" id="wordCount" min="20" value="30" placeholder="Words / Seconds">

<button onclick="startTest()">Start Test</button>
<button onclick="toggleTheme()">Dark / Light</button>
</div>

<div id="paragraph" class="paragraph"></div>

<textarea id="inputBox" placeholder="Start typing..." disabled></textarea>

<div class="stats">
<span>Time: <span id="time">0</span>s</span>
<span>WPM: <span id="wpm">0</span></span>
<span>Accuracy: <span id="accuracy">0</span>%</span>
</div>

<button onclick="finishTest()">Finish</button>

<h2>Leaderboard</h2>
<table id="leaderboard">
<tr><th>Name</th><th>WPM</th><th>Accuracy</th></tr>
</table>

</div>

<script src="languages.js"></script>
<script src="script.js"></script>

</body>
</html>
